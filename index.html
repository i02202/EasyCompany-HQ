<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easy Company HQ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #080810;
      color: #eee;
      font-family: 'Courier New', monospace;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #game-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    /* React overlay will go here (Phase C+) */
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #ui-overlay > * {
      pointer-events: auto;
    }
    /* Tooltip (reused from MiniVRS) */
    #tooltip {
      position: fixed;
      background: rgba(0,0,0,0.9);
      border: 1px solid #e94560;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 11px;
      pointer-events: none;
      display: none;
      z-index: 100;
      max-width: 220px;
    }
    #tooltip .name { color: #e94560; font-weight: bold; }
    #tooltip .state { color: #aaa; }
    #tooltip .task { color: #66aaff; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="ui-overlay"></div>
  <div id="tooltip">
    <div class="name"></div>
    <div class="state"></div>
    <div class="task"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
